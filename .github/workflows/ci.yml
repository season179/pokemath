name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check:metas
      - name: Typecheck worker + shared (game tsconfig needs editor-generated Cocos types)
        run: npx tsc --noEmit -p worker/tsconfig.json
