<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Creature Tamer — Creature Atlas</title>
  <style>
    :root {
      --ink: #0a1020;
      --panel: #111b31;
      --panel-2: #17243e;
      --line: #2a3b5f;
      --paper: #f3eedc;
      --muted: #9ba9c3;
      --gold: #ffc857;
      --aqua: #63d6d0;
      --coral: #ff7b72;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-width: 0;
      background: var(--ink);
      color: var(--paper);
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
    }

    body {
      width: 2520px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 7% 2%, rgba(99, 214, 208, 0.14), transparent 17%),
        radial-gradient(circle at 95% 1%, rgba(255, 200, 87, 0.12), transparent 18%),
        var(--ink);
    }

    main { padding: 72px 72px 88px; }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 48px;
      padding: 0 8px 42px;
      border-bottom: 2px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -1.8px;
    }

    .kicker {
      margin: 0 0 14px;
      color: var(--aqua);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .summary {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 23px;
      font-weight: 600;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 780px;
    }

    .pill {
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(17, 27, 49, 0.8);
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .pill strong { color: var(--paper); }

    section { margin-top: 52px; }

    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin: 0 8px 22px;
    }

    h2 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.6px;
    }

    .section-count {
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 22px;
    }

    .family {
      min-width: 0;
      padding: 19px;
      border: 2px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(150deg, var(--panel-2), var(--panel));
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    .family-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 2px 13px;
    }

    .family-id {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.8px;
    }

    .family-kind {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1.3px;
      text-transform: uppercase;
    }

    figure { margin: 0; }
    figure + figure { margin-top: 15px; }

    .sprite-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 154px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background-color: #d9e0df;
      background-image:
        linear-gradient(45deg, #c9d2d0 25%, transparent 25%),
        linear-gradient(-45deg, #c9d2d0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #c9d2d0 75%),
        linear-gradient(-45deg, transparent 75%, #c9d2d0 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    .sprite-frame img {
      display: block;
      width: 432px;
      height: 144px;
      max-width: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: translateX(var(--alpha-shift-x, 0px)) translateY(var(--alpha-shift-y, 0px));
    }

    figcaption {
      margin-top: 8px;
      color: var(--paper);
      font-size: 17px;
      font-weight: 850;
      letter-spacing: 0.7px;
      text-align: center;
    }

    figcaption.alt { color: var(--gold); }

    footer {
      margin-top: 48px;
      padding-top: 28px;
      border-top: 2px solid var(--line);
      color: var(--muted);
      font-size: 17px;
      font-weight: 650;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="kicker">Pocket Creature Tamer</p>
        <h1>Creature Atlas</h1>
        <p class="summary">Every creature sprite sheet in one place, with standard and alternate palettes paired together.</p>
      </div>
      <div class="legend" aria-label="Atlas summary">
        <span class="pill"><strong>40</strong> families</span>
        <span class="pill"><strong>80</strong> sprite sheets</span>
        <span class="pill"><strong>3</strong> collections</span>
      </div>
    </header>

    <div id="atlas"></div>

    <footer>Source: art-samples/Pocket Creature Tamer/Creatures · Original pixel art preserved at 3× nearest-neighbor scale</footer>
  </main>

  <script>
    const collections = [
      { dir: "2EVO", title: "Two-stage evolution families", count: 10, suffix: "_2" },
      { dir: "3EVO", title: "Three-stage evolution families", count: 22, suffix: "" },
      { dir: "Uniques", title: "Unique creatures", count: 8, suffix: "" },
    ];

    const root = "creature-assets";
    const atlas = document.querySelector("#atlas");

    function centerVisiblePixels(img) {
      if (!img.complete || !img.naturalWidth || !img.naturalHeight) return;

      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(img, 0, 0);
      const pixels = context.getImageData(0, 0, canvas.width, canvas.height).data;
      let minX = canvas.width;
      let maxX = -1;
      let minY = canvas.height;
      let maxY = -1;

      for (let y = 0; y < canvas.height; y += 1) {
        for (let x = 0; x < canvas.width; x += 1) {
          if (pixels[(y * canvas.width + x) * 4 + 3] === 0) continue;
          minX = Math.min(minX, x);
          maxX = Math.max(maxX, x);
          minY = Math.min(minY, y);
          maxY = Math.max(maxY, y);
        }
      }

      if (maxX < minX || maxY < minY) return;
      const scaleX = img.clientWidth / img.naturalWidth;
      const scaleY = img.clientHeight / img.naturalHeight;
      const visibleCenterX = (minX + maxX + 1) / 2;
      const visibleCenterY = (minY + maxY + 1) / 2;
      img.style.setProperty("--alpha-shift-x", `${(canvas.width / 2 - visibleCenterX) * scaleX}px`);
      img.style.setProperty("--alpha-shift-y", `${(canvas.height / 2 - visibleCenterY) * scaleY}px`);
    }

    function centerAllSprites() {
      document.querySelectorAll(".sprite-frame img").forEach(centerVisiblePixels);
    }

    for (const collection of collections) {
      const section = document.createElement("section");
      section.innerHTML = `
        <div class="section-heading">
          <h2>${collection.title}</h2>
          <span class="section-count">${collection.count} families · ${collection.count * 2} sheets</span>
        </div>
        <div class="grid"></div>
      `;

      const grid = section.querySelector(".grid");
      for (let number = 1; number <= collection.count; number += 1) {
        const id = String(number).padStart(2, "0");
        const folder = `${id}${collection.suffix}`;
        const base = `${root}/${collection.dir}/${folder}`;
        const family = document.createElement("article");
        family.className = "family";
        family.setAttribute("data-family", `${collection.dir}-${id}`);
        family.innerHTML = `
          <div class="family-head">
            <span class="family-id">${collection.dir} ${id}</span>
            <span class="family-kind">Standard + Alt</span>
          </div>
          <figure>
            <div class="sprite-frame"><img src="${base}/${id}.png" alt="${collection.dir} ${id}"></div>
            <figcaption>${collection.dir} ${id}</figcaption>
          </figure>
          <figure>
            <div class="sprite-frame"><img src="${base}/${id}_alt.png" alt="${collection.dir} ${id} alternate palette"></div>
            <figcaption class="alt">${collection.dir} ${id} ALT</figcaption>
          </figure>
        `;
        grid.appendChild(family);
      }

      atlas.appendChild(section);
    }

    window.addEventListener("load", centerAllSprites);
    window.addEventListener("resize", centerAllSprites);
  </script>
</body>
</html>
